  <script>
  	// Sort the elements by tag
  	// I hardly know javascript.

  	let activeTags = []
  	let gameDisplays = Array.from(document.getElementsByClassName("gameDisplay"))
  	console.log(gameDisplays[0])
  	function elementVisibilityByTags(checkbox) {
  		if (activeTags.includes(checkbox.id)) {
  			console.log("Removed "+checkbox.id)
  			let toRemove = checkbox.id
  			activeTags.splice(activeTags.indexOf(checkbox.id), 1)
  		} else {
  			console.log("Added "+checkbox.id)
				activeTags.push(checkbox.id)
  		}
  		for (var i = 0; i < gameDisplays.length; i++) {
				let element = gameDisplays[i]
				let willShow = true
				let tags = element.getAttribute("tags")
				console.log("i"+i)
				for (var t = 0; t < activeTags.length; t++) {
					let tag = activeTags[t]
					console.log(tag)
					if (!tags.includes(tag)) {
						willShow = false
						element.style.display = "none"
						break
					}
				}
				if (willShow) {
					element.style.display = "block"
				}
			}
  	}
